name: Deploy Quartz Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compute Quartz site settings
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [[ "$repo_name" == "${GITHUB_REPOSITORY_OWNER}.github.io" ]]; then
            default_base_url="${GITHUB_REPOSITORY_OWNER}.github.io"
          else
            default_base_url="${GITHUB_REPOSITORY_OWNER}.github.io/${repo_name}"
          fi

          echo "QUARTZ_BASE_URL=${QUARTZ_BASE_URL_OVERRIDE:-$default_base_url}" >> "$GITHUB_ENV"
          echo "QUARTZ_SITE_TITLE=${QUARTZ_SITE_TITLE_OVERRIDE:-MCP Research Wiki}" >> "$GITHUB_ENV"
        env:
          QUARTZ_BASE_URL_OVERRIDE: ${{ vars.QUARTZ_BASE_URL }}
          QUARTZ_SITE_TITLE_OVERRIDE: ${{ vars.QUARTZ_SITE_TITLE }}

      - name: Prepare Quartz build tree
        run: ./quartz-publish/prepare-build.sh .quartz-build/quartz

      - name: Install Quartz dependencies
        working-directory: .quartz-build/quartz
        run: npm ci

      - name: Build Quartz
        working-directory: .quartz-build/quartz
        run: npx quartz build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .quartz-build/quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
